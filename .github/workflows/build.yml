name: build-and-deploy

on:
  schedule:
    - cron: "*/20 * * * *"   # ~každých 20 min (GitHub spouští s mírným zpožděním)
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write   # write kvůli keepalive
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Prague
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      # přírůstkový cache stažených fotek mezi běhy
      - uses: actions/cache@v4
        with:
          path: public/photos
          key: photos-${{ github.run_id }}
          restore-keys: photos-

      - name: Build gallery
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          TARGET_DRIVE_FOLDER_ID: ${{ secrets.TARGET_DRIVE_FOLDER_ID }}
          GALLERY_DAYS: "7"
        run: python build_gallery.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Keepalive (prevent cron disable)
        run: |
          last=$(git log -1 --format=%ct)
          days=$(( ($(date +%s) - last) / 86400 ))
          echo "Dní od posledního commitu: $days"
          if [ "$days" -ge 50 ]; then
            git config user.name "keepalive-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "keepalive"
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
